name: Update 401(k) Balance

on:
  workflow_dispatch:
    inputs:
      balance:
        description: New total 401(k) balance
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update 401(k) and history
        run: |
          python scripts/update_portfolio.py 401k \
            --balance "${{ inputs.balance }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json data/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update 401(k) balance"
            git push
          fi
