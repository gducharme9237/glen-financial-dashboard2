name: Update E*Trade Holding

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: Existing holding to update
        required: true
        type: choice
        options:
          - FSKAX
          - SCHD
          - VOO
          - VXUS
      shares:
        description: Number of shares purchased
        required: true
        type: string
      purchase_price:
        description: Purchase price per share
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update holding and history
        run: |
          python scripts/update_portfolio.py brokerage \
            --ticker "${{ inputs.ticker }}" \
            --shares "${{ inputs.shares }}" \
            --price "${{ inputs.purchase_price }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json data/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ${{ inputs.ticker }} holding"
            git push
          fi
