name: Update HYS Balance

on:
  workflow_dispatch:
    inputs:
      transaction_type:
        description: Type of HYS activity
        required: true
        type: choice
        options:
          - deposit
          - interest
          - withdrawal
      amount:
        description: Transaction amount
        required: true
        type: string
      note:
        description: Optional note
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update HYS and history
        run: |
          python scripts/update_portfolio.py hys \
            --type "${{ inputs.transaction_type }}" \
            --amount "${{ inputs.amount }}" \
            --note "${{ inputs.note }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json data/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update HYS balance"
            git push
          fi
