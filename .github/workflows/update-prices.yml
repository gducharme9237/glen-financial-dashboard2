name: Update dashboard prices and history

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

jobs:
  update-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch current prices
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python scripts/update_prices.py

      - name: Record daily history snapshot
        run: python scripts/update_history.py

      - name: Commit dashboard data
        run: |
          if git diff --quiet data/prices.json data/history.json; then
            echo "No dashboard data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/history.json
          git commit -m "Update dashboard prices and history"
          git push
          git push
